<style>
    header {
        background: linear-gradient(0deg, rgba(57, 150, 196, 0) 7%, rgba(0, 0, 0, 0.77) 55%, rgba(0, 0, 0, 1) 100%);
    }

    body {
        background-color: rgb(0, 0, 0);
    }

    /* Scrolling background - DARK MODE ONLY */
    body:not(.light-theme) {
        background-image: url(./imgs/scammersbg.png);
        background-repeat: repeat;
        background-size: 200px;
        background-attachment: fixed;
        animation: diagonalScroll 50s linear infinite;
    }

    /* Light mode background */
    body.light-theme {
        background-color: var(--bg-primary);
        background-image: none;
        animation: none;
    }

    /* Light mode header gradient */
    body.light-theme header {
        background: linear-gradient(0deg, rgba(231, 235, 235, 0) 7%, rgba(255, 255, 255, 0.77) 55%, rgb(255, 255, 255) 100%);
    }

    @keyframes diagonalScroll {
        0% {
            background-position: 0px 0px;
        }

        100% {
            background-position: 900px 900px;
        }
    }

    .scammer-info a:-webkit-any-link {
    color: cornflowerblue;
    text-decoration: none;
    font-family: 'Merriweather';
    transition: color 0.2s;
    }

        .scammer-info a:-webkit-any-link:hover {
    color: #4a9eff;
    }

.scammer-info a:-webkit-any-link h2 svg {
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.scammer-info a:-webkit-any-link:hover h2 svg {
        transform: translateX(4px);
}

    .hero-epic {
        -webkit-text-stroke: 2px #000;
        font-family: 'Slapstick';
        background: linear-gradient(360deg, #630606 10%, #e92703 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        height: 68px;
        display: inline-block;
        animation: colorShift 3s ease-in-out infinite alternate;
    }

    .catalog-grid {
        display: flex;
        gap: 23px 15px;
        animation: fadeIn 0.5s;
        justify-items: center;
        padding-bottom: 20px;
        align-items: baseline;
        justify-content: space-evenly;
        flex-wrap: wrap;
    }

    /* Scammer Block Styling */
    .scammer-block {
        background: var(--bg-item);
        border: 2px solid var(--border-color);
        border-radius: 15px;
        padding: 20px;
        transition: all 0.3s;
        box-shadow: inset -2px -2px 4px rgba(0, 0, 0, 0.4);
    }



    .scammer-block:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px var(--shadow-color), inset -2px -2px 4px rgba(0, 0, 0, 0.4);
        background: var(--bg-item-hover);
    }

    .scammer-content {
        display: flex;
        gap: 15px;
        align-items: flex-start;
    }

    .scammer-img {
    width: 70px;
    height: 70px;
    filter: drop-shadow(2px 4px 6px black);
    object-fit: cover;
    }

    .scammer-info {
        flex: 1;
    }

    .scammer-info h2 {
        margin: 0 0 8px 0;
        font-size: 22px;
        text-wrap-mode: nowrap;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .scammer-info h2 a {
        color: var(--text-primary);
        text-decoration: none;
        transition: color 0.2s;
    }

    .scammer-info h2 a:hover {
        color: #4a9eff;
    }

    .scammer-info p {
        margin: 5px 0;
        max-width: 225px;
        font-size: 14px;
        color: var(--text-secondary);
    }

    .scammer-info strong {
        color: var(--text-primary);
    }

    .loading {
        text-align: center;
        color: var(--text-secondary);
        padding: 40px;
        font-size: 16px;
    }

    .error {
        text-align: center;
        color: #ff6b6b;
        padding: 40px;
        font-size: 16px;
    }

    /* Stats counter for hero section */
    .scammer-stats {
        display: inline-block;
        margin-top: 15px;
        padding: 8px 16px;
        background: rgba(255, 0, 0, 0.1);
        border: 1px solid rgba(255, 0, 0, 0.3);
        border-radius: 20px;
        color: #ff6b6b;
        font-weight: 600;
        font-size: 14px;
    }

    /* Better Discord badge */
    #scammerdiscordpill {
        border-left-style: solid;
        border-color: #3a43a9;
        color: #ffffff !important;
        align-self: flex-start;
        width: fit-content;
        corner-shape: squircle;
        border-radius: 14px;
        padding: 6px 12px;
        background: #5865F2;
        filter: brightness(1);
        display: flex;
        align-items: center;
        transition: all 0.2s;
        text-decoration: none;
        gap: 6px;
        font-weight: 600;
    }

    #scammerdiscordpill:hover {
        background: #4752C4;
    }

    #scammerdiscordpill img {
        width: 18px !important;
        height: 18px;
        filter: brightness(1.2);
    }

    /* Loading skeleton */
    .scammer-skeleton {
        background: linear-gradient(90deg,
                var(--bg-item) 25%,
                var(--border-color) 50%,
                var(--bg-item) 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
        border-radius: 15px;
        height: 120px;
        width: 250px;
    }

    @keyframes loading {
        0% {
            background-position: 200% 0;
        }

        100% {
            background-position: -200% 0;
        }
    }

    /* Empty state */
    .catalog-grid:empty::after {
        content: "No scammers found matching your search 🎉";
        color: var(--text-secondary);
        font-size: 18px;
        padding: 60px 20px;
        text-align: center;
        display: block;
    }

    /* Alt accounts styling */
    .scammer-info p:has(strong:contains("Alts")) a {
        display: inline-flex;
        padding: 2px 8px;
        background: rgba(255, 107, 107, 0.15);
        border-radius: 6px;
        margin: 2px;
        color: #ff6b6b !important;
        transition: all 0.2s;
    }

    .scammer-info p a:hover {
        background: rgba(255, 107, 107, 0.25);
        transform: translateY(-1px);
    }

    /* Warning badge for high-risk scammers */
    .scammer-warning {
        position: absolute;
        top: 10px;
        right: 10px;
        background: linear-gradient(135deg, #ff3c3c, #9f0000);
        color: white;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        box-shadow: 0 2px 8px rgba(255, 60, 60, 0.4);
    }

    /* Improved scammer block positioning */
    .scammer-block {
        position: relative;
    }

    /* Thread Evidence Button */
    .thread-evidence-btn {
        margin-top: 10px;
        padding: 8px 16px;
        background: #434343;
        color: rgba(255, 255, 255, 0.767);
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-variant: all-petite-caps;
        corner-shape: notch;
        font-size: 14px;
        font-weight: 600;
        border: solid #6b6b6b 2px;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.2s;
        width: 100%;
        justify-content: center;
    }

    .thread-evidence-btn:hover {
        background: #5b5b5b;
        transform: translateY(-1px);
    }

    .thread-evidence-btn svg {
        width: 16px;
        height: 16px;
    }

    /* Thread Evidence Modal */
    .thread-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(5px);
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow-y: auto;
    }

    .thread-modal-content {
        background: var(--bg-primary);
        border: 2px solid var(--border-color);
        border-radius: 15px;
        max-width: 900px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        position: relative;
    }

    .thread-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        border-bottom: 2px solid var(--border-color);
        background: linear-gradient(135deg, rgb(242 166 88 / 22%), rgba(71, 82, 196, 0.1));
    }

    .thread-header h2 {
        margin: 0;
        color: var(--text-primary);

        font-size: 27px;
        font-weight: 700;
        font-variant: all-petite-caps;
    }

    .thread-close {
        background: none;
        border: none;
        font-size: 32px;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 0;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: all 0.2s;
    }

    .thread-close:hover {
        background: rgba(255, 107, 107, 0.2);
        color: #ff6b6b;
    }

    .thread-info {
        padding: 15px 20px;
        background: var(--bg-item);
        border-bottom: 1px solid var(--border-color);
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
    }

    .thread-info p {
        margin: 0;
        color: var(--text-secondary);
        font-size: 14px;
    }

    .thread-info strong {
        color: var(--text-primary);
    }

    .thread-messages {
        background-color: Canvas;
        padding: 20px;
    }

    .thread-message {
        background: var(--bg-item);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 15px;
        transition: all 0.2s;
    }

    .message-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
    }

    .message-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px solid var(--border-color);
    }

    .message-author {
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .message-author strong {
        color: var(--text-primary);
        font-size: 16px;
    }

    .message-timestamp {
        color: var(--text-secondary);
        font-size: 12px;
    }

    .message-content {
        color: var(--text-primary);
        margin: 10px 0;
        line-height: 1.6;
        white-space: pre-wrap;
        word-wrap: break-word;
    }

    .message-attachments {
        margin-top: 10px;
        display: flex;
        flex-direction: row;
        gap: 10px;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: flex-start;
    }

    .attachment-image {
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid var(--border-color);
    }

    .attachment-image img {
